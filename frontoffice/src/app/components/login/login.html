<div class="auth">
  <!-- Painel visual -->
  <aside class="auth-aside" aria-hidden="true">
    <div class="aside-blob"></div>
    <div class="aside-content">
      <span class="aside-mark">M</span>
      <h2>Os mercados da tua cidade<br />num só sítio.</h2>
      <p>Entra para continuar a comprar fresco e local.</p>
    </div>
    <div class="aside-ticker">
      <span>FRUTAS ✳ PADARIA ✳ CARNE ✳ PEIXE ✳ BEBIDAS ✳</span>
    </div>
  </aside>

  <!-- Formulário -->
  <main class="auth-main">
    <div class="auth-box">
      <h1>Bem-vindo de volta</h1>
      <p class="sub">Entra na tua conta de cliente</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
        <label class="field">
          <span>Email</span>
          <div
            class="input"
            [class.bad]="form.controls.email.touched && form.controls.email.invalid"
          >
            <mat-icon>mail</mat-icon>
            <input
              type="email"
              formControlName="email"
              autocomplete="email"
              placeholder="o.teu@email.pt"
            />
          </div>
          @if (form.controls.email.touched && form.controls.email.hasError('required')) {
            <small>O email é obrigatório.</small>
          } @else if (form.controls.email.touched && form.controls.email.hasError('email')) {
            <small>Email inválido.</small>
          }
        </label>

        <label class="field">
          <span>Password</span>
          <div
            class="input"
            [class.bad]="form.controls.password.touched && form.controls.password.invalid"
          >
            <mat-icon>lock</mat-icon>
            <input
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              autocomplete="current-password"
              placeholder="••••••••"
            />
            <button type="button" class="eye" (click)="showPassword.set(!showPassword())">
              <mat-icon>{{ showPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
          @if (form.controls.password.touched && form.controls.password.hasError('required')) {
            <small>A password é obrigatória.</small>
          }
        </label>

        @if (errorMsg()) {
          <div class="alert">
            <mat-icon>error_outline</mat-icon><span>{{ errorMsg() }}</span>
          </div>
        }

        <button type="submit" class="submit" [disabled]="loading() || form.invalid">
          @if (loading()) {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            Entrar
          }
        </button>
      </form>

      <p class="foot">Ainda não tens conta? <a routerLink="/register">Cria uma agora</a></p>
    </div>
  </main>
</div>
