<div class="auth">
  <aside class="auth-aside" aria-hidden="true">
    <div class="aside-blob"></div>
    <div class="aside-content">
      <span class="aside-mark">M</span>
      <h2>Junta-te ao<br>mercado local.</h2>
      <p>Cria a tua conta e começa a encomendar fresco hoje.</p>
    </div>
    <div class="aside-ticker">
      <span>FRUTAS ✳ PADARIA ✳ CARNE ✳ PEIXE ✳ BEBIDAS ✳</span>
    </div>
  </aside>

  <main class="auth-main">
    <div class="auth-box wide">
      <h1>Criar conta</h1>
      <p class="sub">Conta de cliente — para comprar nos mercados locais</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
        <label class="field">
          <span>Nome completo</span>
          <div class="input" [class.bad]="form.controls.name.touched && form.controls.name.invalid">
            <mat-icon>person</mat-icon>
            <input formControlName="name" autocomplete="name" placeholder="O teu nome">
          </div>
          @if (form.controls.name.touched && form.controls.name.hasError('required')) {
            <small>O nome é obrigatório.</small>
          }
        </label>

        <label class="field">
          <span>Email</span>
          <div class="input" [class.bad]="form.controls.email.touched && form.controls.email.invalid">
            <mat-icon>mail</mat-icon>
            <input type="email" formControlName="email" autocomplete="email" placeholder="o.teu@email.pt">
          </div>
          @if (form.controls.email.touched && form.controls.email.hasError('required')) {
            <small>O email é obrigatório.</small>
          } @else if (form.controls.email.touched && form.controls.email.hasError('email')) {
            <small>Email inválido.</small>
          }
        </label>

        <div class="row2">
          <label class="field">
            <span>Telefone</span>
            <div class="input" [class.bad]="form.controls.phone.touched && form.controls.phone.invalid">
              <mat-icon>call</mat-icon>
              <input formControlName="phone" autocomplete="tel" inputmode="tel" placeholder="9XX XXX XXX">
            </div>
          </label>
          <label class="field">
            <span>Morada</span>
            <div class="input" [class.bad]="form.controls.address.touched && form.controls.address.invalid">
              <mat-icon>place</mat-icon>
              <input formControlName="address" autocomplete="street-address" placeholder="Rua, nº, cidade">
            </div>
          </label>
        </div>

        <div class="row2">
          <label class="field">
            <span>Password</span>
            <div class="input" [class.bad]="form.controls.password.touched && form.controls.password.invalid">
              <mat-icon>lock</mat-icon>
              <input type="password" formControlName="password" autocomplete="new-password" placeholder="Mín. 6 caracteres">
            </div>
            @if (form.controls.password.touched && form.controls.password.hasError('minlength')) {
              <small>Mínimo 6 caracteres.</small>
            }
          </label>
          <label class="field">
            <span>Confirmar</span>
            <div class="input" [class.bad]="form.controls.confirm.touched && form.hasError('mismatch')">
              <mat-icon>lock</mat-icon>
              <input type="password" formControlName="confirm" autocomplete="new-password" placeholder="Repete a password">
            </div>
            @if (form.controls.confirm.touched && form.hasError('mismatch')) {
              <small>As passwords não coincidem.</small>
            }
          </label>
        </div>

        @if (errorMsg()) {
          <div class="alert"><mat-icon>error_outline</mat-icon><span>{{ errorMsg() }}</span></div>
        }

        <button type="submit" class="submit" [disabled]="loading() || form.invalid">
          @if (loading()) { <mat-spinner diameter="20"></mat-spinner> } @else { Criar conta }
        </button>
      </form>

      <p class="foot">Já tens conta? <a routerLink="/login">Inicia sessão</a></p>
    </div>
  </main>
</div>
